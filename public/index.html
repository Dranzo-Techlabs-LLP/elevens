<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>ELEVENS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #14532d;
    font-family: system-ui, -apple-system, sans-serif;
    touch-action: none;           /* stop pinch-zoom / scroll stealing touches */
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
  }
  canvas { display: block; position: fixed; inset: 0; }

  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    background: rgba(10, 30, 15, 0.88);
    color: #fff;
    z-index: 10;
    text-align: center;
    padding: 20px;
  }
  .hidden { display: none !important; }
  h1 { font-size: 44px; letter-spacing: 6px; }
  h2 { font-size: 26px; }
  input {
    font-size: 18px; padding: 10px 14px;
    border: none; border-radius: 8px;
    width: 220px; text-align: center;
    text-transform: none;
  }
  #code { text-transform: uppercase; width: 120px; }
  button {
    font-size: 18px; font-weight: 700;
    padding: 12px 26px;
    border: none; border-radius: 10px;
    background: #22c55e; color: #052e16;
    cursor: pointer;
  }
  button:active { transform: scale(0.96); }
  .row { display: flex; gap: 8px; align-items: center; }
  .err { color: #fca5a5; min-height: 1.2em; font-size: 14px; }
  .teams { display: flex; gap: 40px; }
  .teams > div { min-width: 120px; }
  .teams h3 { margin-bottom: 8px; }
  .teams .A h3 { color: #60a5fa; }
  .teams .B h3 { color: #f87171; }
  .teams li { list-style: none; padding: 3px 0; font-size: 16px; }
  .muted { color: #a7c4ae; font-size: 14px; }

  #banner {
    position: fixed; top: 18%; left: 0; right: 0;
    text-align: center;
    font-size: 46px; font-weight: 900; color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
  }
  #banner.show { opacity: 1; }

  /* touch controls (shown only on touch devices, in-game) */
  #kick {
    position: fixed;
    right: max(24px, env(safe-area-inset-right));
    bottom: max(28px, env(safe-area-inset-bottom));
    width: 92px; height: 92px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 3px solid rgba(255,255,255,0.55);
    color: #fff; font-weight: 800; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    z-index: 6;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="menu" class="overlay">
  <h1>ELEVENS</h1>
  <input id="name" placeholder="Your name" maxlength="12" autocomplete="off">
  <button id="create">Create room</button>
  <div class="row">
    <input id="code" placeholder="CODE" maxlength="4" autocomplete="off">
    <button id="join">Join</button>
  </div>
  <p id="menu-err" class="err"></p>
</div>

<div id="lobby" class="overlay hidden">
  <h2>Room <span id="room-code" style="letter-spacing:4px"></span></h2>
  <p class="muted">Share the code. Friends join from the same URL.</p>
  <div class="teams">
    <div class="A"><h3>Team A</h3><ul id="teamA"></ul></div>
    <div class="B"><h3>Team B</h3><ul id="teamB"></ul></div>
  </div>
  <button id="start" class="hidden">Start match</button>
  <p id="wait-host" class="muted">Waiting for host to start…</p>
</div>

<div id="end" class="overlay hidden">
  <h2 id="result"></h2>
  <p id="final-score" style="font-size:20px"></p>
  <button id="rematch">Rematch</button>
  <p id="rematch-note" class="muted"></p>
</div>

<div id="banner"></div>
<div id="kick" class="hidden">KICK</div>

<script src="main.js"></script>
</body>
</html>
