<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ELEVENS physics lab — M1</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; font-family: system-ui, sans-serif; }
  #hud {
    position: fixed; left: 12px; top: 12px; z-index: 5;
    color: #fff; font-size: 13px; line-height: 1.5;
    background: rgba(0,0,0,0.55); padding: 10px 14px; border-radius: 10px;
    max-width: 330px;
  }
  #hud b { color: #4ade80; }
  #shots { margin: 6px 0 0; padding-left: 16px; max-height: 180px; overflow-y: auto; }
  #shots li { margin-bottom: 4px; }
  .presets { position: fixed; left: 12px; bottom: 12px; z-index: 5; display: flex; gap: 8px; flex-wrap: wrap; max-width: 60vw; }
  .presets button {
    font-size: 13px; font-weight: 700; padding: 10px 14px;
    border: none; border-radius: 8px; cursor: pointer;
    background: #22c55e; color: #052e16;
  }
  .presets button.alt { background: #3b82f6; color: #eff6ff; }
  .presets button.warn { background: #f59e0b; color: #451a03; }
</style>
</head>
<body>
<div id="hud">
  <div><b>M1 physics lab</b> — FIFA ball vs real aero</div>
  <div id="live">…</div>
  <div><b>WASD</b> move · <b>Shift</b> sprint · click pitch = kick ball · presets below</div>
  <ul id="shots"></ul>
</div>
<div class="presets">
  <button id="p-pass">Ground pass 14 m/s</button>
  <button id="p-driven" class="alt">Driven 22 m/s</button>
  <button id="p-lofted" class="alt">Lofted +backspin</button>
  <button id="p-curler" class="warn">Curler (sidespin)</button>
  <button id="p-drop">Drop test (bounce)</button>
  <button id="p-reset">Reset ball</button>
</div>
<script type="module" src="/src/lab/main.ts"></script>
</body>
</html>
